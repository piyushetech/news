name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  node-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inshort/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: node -e "require('./src/app')"

  python-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inshort/python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q

  docker-build:
    runs-on: ubuntu-latest
    needs: [node-backend, python-service]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f inshort/infra/docker-compose.yml build
